<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Home</title>

<link rel="stylesheet" href="style.css">


<style>

body{

margin:0;
font-family:Arial,sans-serif;
min-height:100vh;

background:
linear-gradient(
rgba(0,70,140,0.65),
rgba(0,150,200,0.65)
),
url("books-students.jpg");

background-size:cover;
background-position:center;

animation:bgMove 10s infinite alternate;

}



@keyframes bgMove{

from{
background-position:center top;
}

to{
background-position:center bottom;
}

}




/* top area */

.top-header{

color:white;
text-align:center;
padding:25px;
position:relative;

}



.logo-small{

font-size:45px;
animation:float 3s infinite;

}



@keyframes float{

50%{
transform:translateY(-15px);
}

}





/* WhatsApp style profile */

.profile-box{

position:absolute;

right:20px;

top:20px;

background:white;

color:#0d47a1;

padding:8px 15px;

border-radius:25px;

display:flex;

align-items:center;

gap:8px;

cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.2);

}



.profile-icon{

font-size:25px;

}



.profile-name{

font-weight:bold;

}





.options{

display:flex;

flex-direction:column;

align-items:center;

gap:20px;

}




.option-card{

width:280px;

background:white;

padding:18px;

border-radius:15px;

text-align:center;

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

animation:show 1s ease;

}




@keyframes show{

from{

opacity:0;

transform:translateX(-80px);

}

to{

opacity:1;

transform:translateX(0);

}

}





.option-card h2{

color:#0d47a1;

}




.option-card button{

background:#0d47a1;

color:white;

border:none;

padding:10px 20px;

border-radius:8px;

cursor:pointer;

}



</style>


</head>



<body>



<header class="top-header">



<div onclick="openProfile()" class="profile-box">


<div class="profile-icon">

👤

</div>


<div class="profile-name" id="profileName">

Student

</div>


</div>




<div class="logo-small">

🎓

</div>


<h1>StudentHub</h1>


<p id="welcome"></p>



</header>





<section class="options">



<div class="option-card">

<h2>💬 Chat</h2>

<p>
Connect and discuss with students.
</p>

<a href="chat.html">

<button>
Open Chat
</button>

</a>

</div>




<div class="option-card">

<h2>ℹ️ Information</h2>

<p>
Student updates and details.
</p>

<a href="information.html">

<button>
View Info
</button>

</a>

</div>




<div class="option-card">

<h2>📁 Files</h2>

<p>
Upload and manage study materials.
</p>

<a href="files.html">

<button>
Open Files
</button>

</a>

</div>



</section>






<script>


let name =
localStorage.getItem("studentName");



if(name){


document.getElementById("welcome").innerHTML =
"Welcome, " + name + " 👋";


document.getElementById("profileName").innerHTML =
name;


}





function openProfile(){

window.location.href="profile.html";

}



</script>



</body>

</html>
