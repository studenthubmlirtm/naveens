<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Profile</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-box{

width:90%;
max-width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}


.profile-photo{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
font-size:70px;

}


input{

width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;

}


button{

padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#0d47a1;
color:white;
cursor:pointer;

}


</style>

</head>


<body>


<div class="profile-box">


<img id="photo"
class="profile-photo"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">



<h1>My Profile</h1>



<input type="file" id="photoFile">



<h3>
Username
</h3>

<input id="username"
placeholder="Enter username">



<h3>
Gmail
</h3>

<input id="email"
readonly>



<button onclick="saveProfile()">

💾 Save

</button>



<button onclick="goBack()">

🔙 Back

</button>



<button onclick="logout()">

🚪 Logout

</button>


</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


const supabaseUrl =
"https://tcssuookhtmsumukwrta.supabase.co";


const supabaseKey =
"sb_publishable_Up9zO7qCbkuWCNU_5JwVpg_9jSCM9a5";


const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let userId;



async function loadProfile(){


const {data:userData} =
await supabaseClient.auth.getUser();



if(!userData.user){

window.location.href="index.html";

return;

}



userId=userData.user.id;


email.value=userData.user.email;



const {data}=

await supabaseClient
.from("profiles")
.select("*")
.eq("id",userId)
.single();



if(data){

username.value=data.username || "";


if(data.profile_photo){

photo.src=data.profile_photo;

}

}


}




async function saveProfile(){


let imageUrl="";


let file =
photoFile.files[0];



if(file){


let fileName =
userId+"_"+file.name;


const {error}=

await supabaseClient.storage
.from("profile-images")
.upload(fileName,file);



if(error){

alert(error.message);

return;

}



const {data}=

supabaseClient.storage
.from("profile-images")
.getPublicUrl(fileName);


imageUrl=data.publicUrl;


}




let updateData={

username:username.value

};



if(imageUrl){

updateData.profile_photo=imageUrl;

}




const {error}=

await supabaseClient
.from("profiles")
.update(updateData)
.eq("id",userId);



if(error){

alert(error.message);

return;

}



alert("Profile updated 🎉");


}





function goBack(){

window.location.href="home.html";

}




async function logout(){

await supabaseClient.auth.signOut();

window.location.href="index.html";

}




loadProfile();


</script>


</body>

</html>
