<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Profile</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-box{

width:90%;
max-width:420px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}


.profile-photo{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
font-size:70px;
margin:auto;

}


input{

width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ccc;

}


button{

padding:12px 25px;
margin:8px;
border:none;
border-radius:10px;
background:#0d47a1;
color:white;
cursor:pointer;

}


button:hover{

transform:scale(1.05);

}


</style>

</head>


<body>


<div class="profile-box">


<img id="photo"
class="profile-photo"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">



<h1>My Profile</h1>



<input type="file" id="photoFile">



<input id="username" placeholder="Username">


<input id="studentId" placeholder="Student ID">


<input id="department" placeholder="Department">


<input id="year" placeholder="Year">


<input id="semester" placeholder="Semester">


<input id="phone" placeholder="Phone">



<button onclick="saveProfile()">

💾 Save Profile

</button>



<button onclick="backHome()">

🔙 Back

</button>



<button onclick="logout()">

🚪 Logout

</button>



</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>


const supabaseUrl =
"https://tcssuookhtmsumukwrta.supabase.co";


const supabaseKey =
"sb_publishable_Up9zO7qCbkuWCNU_5JwVpg_9jSCM9a5";



const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let userId;



async function loadProfile(){


const {data:userData}=

await supabaseClient.auth.getUser();



if(!userData.user){

window.location.href="index.html";

return;

}



userId=userData.user.id;



const {data}=

await supabaseClient
.from("profiles")
.select("*")
.eq("id",userId)
.single();



if(data){


username.value=data.username || "";

studentId.value=data.student_id || "";

department.value=data.department || "";

year.value=data.year || "";

semester.value=data.semester || "";

phone.value=data.phone || "";


if(data.profile_photo){

photo.src=data.profile_photo;

}


}



}





async function saveProfile(){



let imageUrl="";



const file =
photoFile.files[0];



if(file){


const fileName =
userId+"_"+file.name;



const {error}=

await supabaseClient.storage
.from("profile-images")
.upload(fileName,file);



if(error){

alert(error.message);

return;

}



const {data}=

supabaseClient.storage
.from("profile-images")
.getPublicUrl(fileName);



imageUrl=data.publicUrl;


}



const updateData={


username:username.value,

student_id:studentId.value,

department:department.value,

year:year.value,

semester:semester.value,

phone:phone.value


};



if(imageUrl){

updateData.profile_photo=imageUrl;

}



const {error}=

await supabaseClient
.from("profiles")
.update(updateData)
.eq("id",userId);



if(error){

alert(error.message);

return;

}



alert("Profile updated successfully 🎉");



}





function backHome(){

window.location.href="home.html";

}



async function logout(){

await supabaseClient.auth.signOut();

window.location.href="index.html";

}



loadProfile();



</script>


</body>

</html>
