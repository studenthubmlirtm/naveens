<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Files</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f8ff;
}


/* Top right logo */

.brand-box{

    position:absolute;
    top:20px;
    right:20px;

    background:#0d47a1;
    color:white;

    padding:10px 18px;

    border-radius:10px;

    display:flex;
    align-items:center;
    gap:10px;

    font-weight:bold;
}



.logo{

    font-size:25px;

}



/* Main */

.file-page{

    padding:80px 30px;

}



/* Upload center */

.upload-area{

    text-align:center;

    background:white;

    width:350px;

    margin:0 auto 40px;

    padding:30px;

    border-radius:20px;

    box-shadow:0 5px 20px rgba(0,0,0,0.15);

}



.upload-area button{

    margin-top:15px;

    background:#0d47a1;

    color:white;

    border:none;

    padding:12px 25px;

    border-radius:8px;

    cursor:pointer;

}



/* File list */

.file-list{

    width:80%;

    margin:auto;

}



.file-row{

    background:white;

    margin:10px 0;

    padding:15px;

    border-radius:10px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 3px 10px rgba(0,0,0,0.1);

}



.file-actions button{

    margin-left:5px;

    padding:8px 12px;

    border:none;

    border-radius:6px;

    cursor:pointer;

}



.preview{

    background:green;

    color:white;

}


.delete{

    background:red;

    color:white;

}



.download{

    background:#1565c0;

    color:white;

}



.back{

    background:#555;

    color:white;

}



.preview-page{

    text-align:center;

    margin-top:100px;

}


</style>

</head>



<body>


<!-- Logo -->

<div class="brand-box">

<div class="logo">
🎓
</div>

StudentHub

</div>




<div class="file-page">



<!-- Upload -->

<div class="upload-area">

<h2>📁 Upload Files</h2>


<input type="file" id="fileInput">


<br>


<button onclick="uploadFile()">

⬆ Upload

</button>


</div>





<!-- Files -->

<div id="fileList" class="file-list">

</div>



</div>





<script>


let files = JSON.parse(localStorage.getItem("files")) || [];



displayFiles();




function uploadFile(){


let input=document.getElementById("fileInput");

let file=input.files[0];


if(!file){

alert("Select a file");

return;

}



let url=URL.createObjectURL(file);



files.push({

name:file.name,

url:url

});



localStorage.setItem(

"files",

JSON.stringify(files)

);



displayFiles();



input.value="";

}




function displayFiles(){


let list=document.getElementById("fileList");


list.innerHTML="";



files.forEach((file,index)=>{


list.innerHTML += `


<div class="file-row">


<div>

📄 ${file.name}

</div>



<div class="file-actions">


<button class="preview"

onclick="previewFile('${file.url}')">

👁 Preview

</button>



<button class="delete"

onclick="deleteFile(${index})">

🗑 Delete

</button>


</div>


</div>


`;


});


}




function previewFile(url){


document.body.innerHTML=`

<div class="brand-box">

🎓 StudentHub

</div>


<div class="preview-page">


<h2>Preview</h2>


<a href="${url}" download>

<button class="download">

⬇ Download

</button>

</a>



<button class="back"

onclick="location.reload()">

🔙 Back

</button>


</div>

`;



}




function deleteFile(index){


files.splice(index,1);


localStorage.setItem(

"files",

JSON.stringify(files)

);


displayFiles();


}


</script>



</body>

</html>
