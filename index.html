<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{

    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    overflow:hidden;

    background:linear-gradient(
        135deg,
        #1565c0,
        #26c6da
    );

}


/* Animated circles */

.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.15);

    animation:move 8s infinite alternate;

}


.circle1{

    width:200px;
    height:200px;

    top:10%;
    left:10%;

}


.circle2{

    width:300px;
    height:300px;

    bottom:5%;
    right:5%;

    animation-delay:2s;

}



@keyframes move{

    from{

        transform:translateY(0);

    }

    to{

        transform:translateY(-80px);

    }

}




.login-container{


    position:relative;

    width:90%;

    max-width:380px;


    background:white;

    padding:40px 30px;


    border-radius:25px;


    text-align:center;


    box-shadow:
    0 15px 35px rgba(0,0,0,0.25);


    animation:show 1s ease;


}



@keyframes show{

    from{

        opacity:0;

        transform:translateY(50px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}




.logo{

    width:90px;

    height:90px;


    margin:auto;


    display:flex;

    justify-content:center;

    align-items:center;


    font-size:50px;


    border-radius:50%;


    background:#e3f2fd;


    animation:rotate 3s infinite;

}




@keyframes rotate{

    0%{

        transform:rotate(0deg);

    }

    50%{

        transform:rotate(10deg);

    }

    100%{

        transform:rotate(0deg);

    }

}



h1{

    color:#0d47a1;

}



input{


    width:100%;

    padding:14px;

    margin-top:15px;


    border-radius:10px;


    border:1px solid #ccc;


    font-size:16px;


}



button{


    width:100%;

    margin-top:20px;


    padding:14px;


    border:none;


    border-radius:10px;


    background:#0d47a1;


    color:white;


    font-size:17px;


    cursor:pointer;


    transition:.3s;


}



button:hover{


    background:#1565c0;

    transform:scale(1.05);

}



a{

    color:#0d47a1;

}



</style>

</head>


<body>


<div class="circle circle1"></div>

<div class="circle circle2"></div>



<div class="login-container">


<div class="logo">
🎓
</div>



<h1>StudentHub</h1>


<p>
Your Student Resource Platform
</p>



<input 
type="email"
placeholder="Enter email"
id="email"
>



<input 
type="password"
placeholder="Enter password"
id="password"
>



<button onclick="login()">

Login

</button>



<p>

New student?

<a href="signup.html">
Create Account
</a>

</p>


</div>



<script>

function login(){

let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;


if(email=="" || password==""){

alert("Enter email and password");

return;

}


// Supabase login code will be connected here

alert("Login system ready");


}


</script>


</body>

</html>
