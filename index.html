<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Login</title>

<link rel="stylesheet" href="style.css">

<style>

/* keep your existing animation/design CSS here */

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:linear-gradient(135deg,#1565c0,#26c6da);
}


.login-container{

    width:90%;
    max-width:380px;
    background:white;
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);

}


.logo{

    font-size:60px;

}



h1{

color:#0d47a1;

}



input{

width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}



button{

width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:10px;
background:#0d47a1;
color:white;
font-size:17px;
cursor:pointer;

}



button:hover{

background:#1565c0;

}



a{

color:#0d47a1;

}


</style>


</head>



<body>



<div class="login-container">


<div class="logo">
🎓
</div>


<h1>StudentHub</h1>


<p>
Your Student Resource Platform
</p>



<input 
type="email"
placeholder="Enter email"
id="email"
>



<input 
type="password"
placeholder="Enter password"
id="password"
>



<button onclick="login()">

Login

</button>




<p>

New student?

<a href="signup.html">
Create Account
</a>

</p>



</div>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>


const supabaseUrl =
"https://tcssuookhtmsumukwrta.supabase.co";


const supabaseKey =
"sb_publishable_Up9zO7qCbkuWCNU_5JwVpg_9jSCM9a5";



const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);





async function login(){


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;



if(email=="" || password==""){

alert("Enter email and password");

return;

}





const {data,error} =
await supabaseClient.auth.signInWithPassword({

email:email,

password:password

});





if(error){

alert("Login failed: " + error.message);

return;

}





localStorage.setItem(

"studentName",

data.user.user_metadata.name || "Student"

);




alert("Login successful 🎉");



window.location.href="home.html";



}



</script>



</body>

</html>
