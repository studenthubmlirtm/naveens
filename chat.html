<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentHub Chat</title>

<link rel="stylesheet" href="style.css">


<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#e5ddd5;

}


.chat-header{

background:#0d47a1;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;

}


.user-area{

display:flex;
align-items:center;
gap:10px;

}


.avatar{

font-size:35px;

}


.online{

color:#00ff00;
font-size:13px;

}



.chat-container{

height:70vh;
overflow-y:auto;
padding:15px;

}



.message{

background:white;
padding:10px;
border-radius:12px;
margin:10px;
max-width:70%;

}



.my-message{

background:#dcf8c6;
margin-left:auto;

}



.bottom{

display:flex;
background:white;
padding:10px;

}



.bottom input{

flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;

}



.bottom button{

border:none;
border-radius:50%;
padding:12px;
margin-left:5px;
background:#0d47a1;
color:white;

}


</style>

</head>


<body>



<div class="chat-header">


<div class="user-area">

<div class="avatar">
👤
</div>


<div>

<h3 id="name">
StudentHub Chat
</h3>


<span class="online">
🟢 Online
</span>


</div>


</div>



<div>

<button onclick="profile()">
👤
</button>


<button onclick="back()">
🔙
</button>


</div>



</div>





<div class="chat-container" id="chatBox">


</div>





<div class="bottom">


<button onclick="emoji()">
😊
</button>


<input 
id="message"
placeholder="Type message..."
>


<button onclick="sendMessage()">
➤
</button>


</div>







<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


const supabaseUrl =
"https://tcssuookhtmsumukwrta.supabase.co";


const supabaseKey =
"sb_publishable_Up9zO7qCbkuWCNU_5JwVpg_9jSCM9a5";



const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let userId;




async function start(){


const {data}=

await supabaseClient.auth.getUser();



if(!data.user){

window.location.href="index.html";

return;

}



userId=data.user.id;



loadMessages();


}




async function sendMessage(){


let text=document.getElementById("message").value;



if(text==""){

return;

}



const {error}=

await supabaseClient
.from("messages")
.insert({

sender_id:userId,

receiver_id:userId,

message:text

});



if(error){

alert(error.message);

return;

}



document.getElementById("message").value="";


loadMessages();


}





async function loadMessages(){



const {data}=

await supabaseClient
.from("messages")
.select("*")
.order("created_at");



let box=document.getElementById("chatBox");


box.innerHTML="";



data.forEach(msg=>{


box.innerHTML += `


<div class="message ${msg.sender_id==userId ? "my-message":""}">

${msg.message}

</div>


`;


});



}





function emoji(){

document.getElementById("message").value += "😊";

}




function profile(){

window.location.href="profile.html";

}



function back(){

window.location.href="home.html";

}




start();



</script>


</body>

</html>
